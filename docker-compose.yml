version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://verdant:verdant_secret@postgres:5432/verdant_guard
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - WECHAT_APPID=${WECHAT_APPID}
      - WECHAT_SECRET=${WECHAT_SECRET}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET=${OSS_BUCKET}
      - OSS_REGION=${OSS_REGION}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - verdant-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=verdant
      - POSTGRES_PASSWORD=verdant_secret
      - POSTGRES_DB=verdant_guard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdant -d verdant_guard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - verdant-network

  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - verdant-network

networks:
  verdant-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: